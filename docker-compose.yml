version: "3.9"

services:
  db:
    image: postgres:17
    container_name: duncan-finance-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: otis
      POSTGRES_PASSWORD: ChangeMe123!
      POSTGRES_DB: duncan_finance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otis -d duncan_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: